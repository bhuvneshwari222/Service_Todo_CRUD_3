<div class="card">
    <div class="card-header">
        <h1 class="m-0">{{isineditMode ? 'Update Todo' : 'Add Todo'}}</h1>
    </div>
    <div class="card-body">
        <form #todoForm="ngForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="todoItem">TodoItem</label>
                <input name="todoItem" required ngModel #todoItem="ngModel" type="text" class="form-control">
            </div>

            <button *ngIf="!isineditMode" mat-raised-button color="accent" class="w-100">Add Todo</button>
            <button (click)="updateTodo()" *ngIf="isineditMode" mat-raised-button color="accent" class="w-100">Update Todo</button>
        </form>
    </div>
</div>
